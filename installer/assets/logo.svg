<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="accent-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>

  <!-- Shield / Predator head shape -->
  <path d="M128 30 C128 30 70 85 70 135 C70 175 95 205 128 215 C161 205 186 175 186 135 C186 85 128 30 128 30Z"
        fill="url(#accent)" opacity="0.92" filter="url(#glow)"/>

  <!-- Jaw line -->
  <path d="M88 160 L50 220 L206 220 L168 160"
        stroke="url(#accent-h)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

  <!-- Inner circle (eye area) -->
  <circle cx="128" cy="130" r="30" fill="rgba(255,255,255,0.08)"/>
  <circle cx="128" cy="130" r="20" fill="rgba(255,255,255,0.04)"/>

  <!-- Predator eye (vertical slit) -->
  <ellipse cx="128" cy="128" rx="6" ry="18" fill="#ff6b35" opacity="0.8"/>
  <ellipse cx="128" cy="128" rx="3" ry="12" fill="white" opacity="0.9"/>

  <!-- Subtle grid lines -->
  <path d="M128 50 L128 215" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <path d="M70 130 L186 130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>
